<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Andie & Beans Tracker</title>

<style>
  body {
    font-family: Arial, sans-serif;
    background: #f7f7f7;
    margin: 0;
    padding: 0;
  }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 15px;
    background: #fff;
    border-bottom: 2px solid #eee;
  }

  header img {
    height: 60px;
    width: auto;
    border-radius: 10px;
  }

  header h1 {
    font-size: 20px;
    margin: 0 10px;
    flex-grow: 1;
    text-align: center;
  }

  .card {
    background: #fff;
    margin: 15px;
    padding: 15px;
    border-radius: 12px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.1);
  }

  .feeding-layout {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .progress-container {
    width: 40%;
  }

  .progress-bar {
    width: 100%;
    height: 20px;
    background: #eee;
    border-radius: 10px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: #ffb347;
    width: 0%;
    transition: width 0.3s ease;
  }

  .feeding-info {
    width: 55%;
    text-align: right;
  }

  button {
    background: #ffb347;
    border: none;
    padding: 10px 15px;
    border-radius: 8px;
    font-size: 16px;
    cursor: pointer;
  }

  #popup {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: #ffb347;
    padding: 15px 20px;
    border-radius: 10px;
    display: none;
    font-size: 16px;
  }

  #activity-list {
    margin-top: 10px;
  }

  .activity-item {
    padding: 8px 0;
    border-bottom: 1px solid #eee;
  }
</style>
</head>

<body>

<header>
  <img src="andie.jpg" alt="Andie">
  <h1>Andie & Beans Tracker</h1>
  <img src="beans.jpg" alt="Beans">
</header>

<div id="popup"></div>

<div class="card" id="feeding-card">
  <h2>Feeding</h2>
  <div class="feeding-layout">
    <div class="progress-container">
      <div class="progress-bar">
        <div class="progress-fill" id="feeding-progress"></div>
      </div>
    </div>

    <div class="feeding-info">
      <div id="feeding-status">Not fed yet</div>
      <button id="feed-btn">I FED ANDIE & BEANS</button>
    </div>
  </div>
</div>

<div class="card" id="water-card">
  <h2>Water</h2>
  <button id="water-btn">Refilled Water</button>
  <div id="water-status">Not refilled yet</div>
</div>

<div class="card" id="activity-card">
  <h2>Today's Activity</h2>
  <button id="activity-btn">Add Activity</button>
  <div id="activity-list"></div>
</div>

<!-- Firebase CDN -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js"></script>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyBnpWl5QPg8QtAlu3DZWpAKUlTDzlUXi0w",
    authDomain: "andie-beans-tracker.firebaseapp.com",
    databaseURL: "https://andie-beans-tracker-default-rtdb.firebaseio.com",
    projectId: "andie-beans-tracker",
    storageBucket: "andie-beans-tracker.firebasestorage.app",
    messagingSenderId: "63969584848",
    appId: "1:63969584848:web:b4376734f6ebdea6d5e0d5"
  };

  const app = firebase.initializeApp(firebaseConfig);
  const db = firebase.database();

  /* ONE-TIME RESET */
  db.ref("/__reset_done").once("value").then(s => {
    if (!s.exists()) {
      db.ref("/feeding").remove();
      db.ref("/water").remove();
      db.ref("/activity").remove();
      db.ref("/popup").remove();
      db.ref("/user").remove();
      db.ref("/__reset_done").set(true);
    }
  });

  /* FEEDING */
  const feedBtn = document.getElementById("feed-btn");
  const feedingStatus = document.getElementById("feeding-status");
  const feedingProgress = document.getElementById("feeding-progress");

  feedBtn.onclick = () => {
    const now = new Date().toLocaleString();
    db.ref("/feeding").set({
      fed: true,
      time: now,
      user: "Evva"
    });
    db.ref("/popup").set("Fed by Evva at " + now);
  };

  db.ref("/feeding").on("value", snap => {
    const data = snap.val();
    if (!data) {
      feedingStatus.textContent = "Not fed yet";
      feedingProgress.style.width = "0%";
      return;
    }
    feedingStatus.textContent = `Fed by ${data.user} at ${data.time}`;
    feedingProgress.style.width = "100%";
  });

  /* WATER */
  const waterBtn = document.getElementById("water-btn");
  const waterStatus = document.getElementById("water-status");

  waterBtn.onclick = () => {
    const now = new Date().toLocaleString();
    db.ref("/water").set({
      time: now,
      user: "Evva"
    });
    db.ref("/popup").set("Water refilled by Evva at " + now);
  };

  db.ref("/water").on("value", snap => {
    const data = snap.val();
    if (!data) {
      waterStatus.textContent = "Not refilled yet";
      return;
    }
    waterStatus.textContent = `Refilled by ${data.user} at ${data.time}`;
  });

  /* ACTIVITY */
  const activityBtn = document.getElementById("activity-btn");
  const activityList = document.getElementById("activity-list");

  activityBtn.onclick = () => {
    const now = new Date().toLocaleString();
    const newItem = db.ref("/activity").push();
    newItem.set({
      text: "Activity added",
      time: now,
      user: "Evva"
    });
    db.ref("/popup").set("Activity added by Evva at " + now);
  };

  db.ref("/activity").on("value", snap => {
    activityList.innerHTML = "";
    snap.forEach(child => {
      const item = child.val();
      const div = document.createElement("div");
      div.className = "activity-item";
      div.textContent = `${item.text} — ${item.user} at ${item.time}`;
      activityList.appendChild(div);
    });
  });

  /* POPUP */
  const popup = document.getElementById("popup");

  db.ref("/popup").on("value", snap => {
    const msg = snap.val();
    if (!msg) {
      popup.style.display = "none";
      return;
    }
    popup.textContent = msg;
    popup.style.display = "block";
    setTimeout(() => popup.style.display = "none", 3000);
  });
</script>

</body>
</html>
